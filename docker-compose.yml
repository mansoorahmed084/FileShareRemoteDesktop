services:
  relay:
    build: ./server
    ports:
      - "8765:8765"
    environment:
      - RD_HOST=0.0.0.0
      - RD_PORT=8765
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
